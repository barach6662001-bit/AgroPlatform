name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish API artifact
        run: |
          dotnet publish src/AgroPlatform.Api/AgroPlatform.Api.csproj \
            --configuration Release --output publish/api

      - name: Archive API artifact
        run: |
          cd publish
          zip -r api-${{ github.ref_name }}.zip api/

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Archive frontend artifact
        run: |
          cd frontend
          zip -r ../publish/frontend-${{ github.ref_name }}.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/api-${{ github.ref_name }}.zip
            publish/frontend-${{ github.ref_name }}.zip
