name: Set repository description

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/set-description.yml'

jobs:
  set-description:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      administration: write
    steps:
      - name: Update repository description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH /repos/${{ github.repository }} \
            -f description='🌾 Цифровая платформа управления агропредприятием — склад, поля, агрооперации, техника, экономика, аналитика. .NET 8 + React 18 + TypeScript + PostgreSQL' \
            -f homepage='https://barach6662001-bit.github.io/AgroPlatform/'

      - name: Update repository topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PUT /repos/${{ github.repository }}/topics \
            --input - <<< '{"names":["agriculture","agro","farm-management","erp","agritech","dotnet","aspnet-core","react","typescript","postgresql","docker","clean-architecture"]}'
