name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/agroplatform-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/agroplatform-frontend

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/AgroPlatform.Api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: [build-api, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/agroplatform
            git checkout -- .
            git pull origin main
            # Login to GHCR on the server (packages are private, token required).
            # Fail loudly here if the token is missing or expired so we never
            # silently keep running stale containers (the #580 incident).
            if [ -z "${GHCR_TOKEN:-}" ]; then
              echo "::error::GHCR_TOKEN is empty — set it in the production environment secrets"
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.deploy.yml up -d --force-recreate --remove-orphans
            docker image prune -f
            echo "Waiting for API health check..."
            API_HEALTHY=0
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8080/health/live > /dev/null 2>&1; then
                echo "API is healthy after ${i}s"
                API_HEALTHY=1
                break
              fi
              sleep 1
            done
            if [ "$API_HEALTHY" -ne 1 ]; then
              echo "::error::API did not become healthy within 60s"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.deploy.yml logs --tail=100 api
              exit 1
            fi
            # Verify the frontend actually serves the new commit SHA by checking
            # that the running frontend container image matches the one we just
            # built (short SHA). This catches silent no-op deploys.
            RUNNING_SHA=$(docker inspect --format='{{.Image}}' agroplatform-frontend-1 2>/dev/null | cut -d':' -f2 | cut -c1-12 || echo "unknown")
            echo "Frontend running image digest prefix: ${RUNNING_SHA}"
            echo "Deployed: ${{ github.sha }}"
