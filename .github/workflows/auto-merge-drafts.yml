name: Auto-merge Copilot PRs

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Specific PR number (leave empty for all Copilot PRs)
        required: false
  # Automatically react to PR lifecycle events so agent PRs are merged
  # without requiring manual workflow_dispatch.
  # pull_request_target runs in the context of the base branch, giving the
  # GITHUB_TOKEN the write permissions needed for merging.
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # For automatic triggers only run for agent-created PRs (Copilot coding
    # agent uses branch names prefixed with "copilot/" and the login
    # "app/copilot" in gh CLI / "copilot-swe-agent[bot]" in the API).
    # Manual workflow_dispatch is always allowed through.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.draft == false &&
        (
          startsWith(github.event.pull_request.head.ref, 'copilot/') ||
          contains(github.event.pull_request.user.login, 'copilot')
        )
      )
    steps:
      - uses: actions/checkout@v4

      - name: Process PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Determine which PRs to process.
          # For automatic triggers the PR number comes from the event payload;
          # for manual dispatch the operator can supply a specific number or
          # leave it empty to scan all open Copilot PRs.
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            PRS="${{ github.event.pull_request.number }}"
          else
            INPUT="${{ github.event.inputs.pr_number }}"
            if [ -n "$INPUT" ]; then
              PRS="$INPUT"
            else
              PRS=$(gh pr list --state open --author "app/copilot" --json number --jq ".[].number" 2>/dev/null || echo "")
            fi
          fi

          if [ -z "$PRS" ]; then
            echo "No PRs to process"
            exit 0
          fi

          PASSED=0; FAILED=0; SKIPPED=0
          for PR in $PRS; do
            echo "========================================="
            echo "Processing PR #$PR"
            TITLE=$(gh pr view "$PR" --json title --jq ".title")
            AUTHOR=$(gh pr view "$PR" --json author --jq ".author.login")
            BRANCH=$(gh pr view "$PR" --json headRefName --jq ".headRefName")
            IS_DRAFT=$(gh pr view "$PR" --json isDraft --jq ".isDraft")
            STATE=$(gh pr view "$PR" --json state --jq ".state")
            echo "Title:  $TITLE"
            echo "Author: $AUTHOR"
            echo "Branch: $BRANCH"
            echo "State:  $STATE"

            # Guard: for manual dispatch, skip PRs that are not agent-created.
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              if [[ "$AUTHOR" != "app/copilot" ]] && [[ "$BRANCH" != copilot/* ]] && [[ "$AUTHOR" != *copilot* ]]; then
                echo "SKIP PR #$PR (not an agent PR)"
                SKIPPED=$((SKIPPED+1))
                continue
              fi
            fi

            if [ "$STATE" != "OPEN" ]; then
              echo "SKIP PR #$PR (state: $STATE)"
              SKIPPED=$((SKIPPED+1))
              continue
            fi

            if [ "$IS_DRAFT" = "true" ]; then
              echo "Converting draft to ready..."
              gh pr ready "$PR" || { echo "SKIP"; SKIPPED=$((SKIPPED+1)); continue; }
              echo "Waiting 60s for CI..."
              sleep 60
            fi

            echo "Waiting for CI checks..."
            TRIES=0; MAX_TRIES=20; CI_RESULT="timeout"
            while [ $TRIES -lt $MAX_TRIES ]; do
              TRIES=$((TRIES + 1))
              CHECK_OUTPUT=$(gh pr checks "$PR" 2>/dev/null || echo "")
              if echo "$CHECK_OUTPUT" | grep -q "fail"; then CI_RESULT="fail"; break; fi
              if echo "$CHECK_OUTPUT" | grep -q "pass" && ! echo "$CHECK_OUTPUT" | grep -q "pending"; then CI_RESULT="pass"; break; fi
              echo "  Attempt $TRIES/$MAX_TRIES: pending..."
              sleep 30
            done
            echo "CI result: $CI_RESULT"

            if [ "$CI_RESULT" = "pass" ]; then
              MERGEABLE=$(gh pr view "$PR" --json mergeable --jq ".mergeable")
              echo "Mergeable: $MERGEABLE"
              if [ "$MERGEABLE" = "MERGEABLE" ]; then
                echo "Merging PR #$PR..."
                if gh pr merge "$PR" --squash --admin; then
                  echo "MERGED PR #$PR"; PASSED=$((PASSED+1))
                else
                  echo "FAIL merge PR #$PR"; FAILED=$((FAILED+1))
                fi
              else
                echo "SKIP PR #$PR (not mergeable: $MERGEABLE)"; FAILED=$((FAILED+1))
              fi
            else
              echo "SKIP PR #$PR ($CI_RESULT)"; FAILED=$((FAILED+1))
            fi
            echo ""
          done
          echo "========================================="
          echo "SUMMARY: Merged=$PASSED Failed=$FAILED Skipped=$SKIPPED"
