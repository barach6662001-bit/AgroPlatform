name: Validate Production Secrets

on:
  workflow_call:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions: {}
    environment: production
    steps:
      - name: Check required secrets
        env:
          HAS_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD != '' }}
          HAS_JWT_KEY: ${{ secrets.JWT_KEY != '' }}
          HAS_DOMAIN: ${{ secrets.DOMAIN != '' }}
          HAS_EMAIL: ${{ secrets.EMAIL != '' }}
          HAS_CORS_ORIGIN: ${{ secrets.CORS_ORIGIN != '' }}
        run: |
          MISSING=0
          echo "=== Validating production secrets ==="

          check_secret() {
            local name="$1"
            local has_value="$2"
            if [ "$has_value" != "true" ]; then
              echo "❌ MISSING: $name"
              MISSING=$((MISSING + 1))
            else
              echo "✅ Found: $name"
            fi
          }

          check_secret "POSTGRES_PASSWORD" "$HAS_POSTGRES_PASSWORD"
          check_secret "JWT_KEY" "$HAS_JWT_KEY"
          check_secret "DOMAIN" "$HAS_DOMAIN"
          check_secret "EMAIL" "$HAS_EMAIL"
          check_secret "CORS_ORIGIN" "$HAS_CORS_ORIGIN"

          echo ""
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required secret(s) missing! See docs/production-secrets.md for setup instructions."
            exit 1
          fi
          echo "✅ All required production secrets are configured."
