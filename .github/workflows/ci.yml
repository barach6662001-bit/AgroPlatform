name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Warn-as-error check (Domain + Application)
        run: |
          dotnet build src/AgroPlatform.Domain/AgroPlatform.Domain.csproj \
            --no-restore --configuration Release --warnaserror
          dotnet build src/AgroPlatform.Application/AgroPlatform.Application.csproj \
            --no-restore --configuration Release --warnaserror

      - name: Run unit tests
        run: |
          dotnet test tests/AgroPlatform.UnitTests \
            --no-build --configuration Release --verbosity normal \
            --logger trx --results-directory TestResults \
            --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: |
          dotnet test tests/AgroPlatform.IntegrationTests \
            --no-build --configuration Release --verbosity normal \
            --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/**/*.trx
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 7

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qiE "\b(Critical|High)\b"; then
            echo "::error::HIGH or CRITICAL vulnerabilities found! Please update affected packages."
            exit 1
          fi
          echo "No HIGH/CRITICAL vulnerabilities detected."

      - name: Publish API
        run: |
          dotnet publish src/AgroPlatform.Api/AgroPlatform.Api.csproj \
            --no-restore --no-build --configuration Release --output publish/api

      - name: Upload API artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-publish
          path: publish/api
          retention-days: 7
