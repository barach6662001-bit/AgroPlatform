global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'agroplatform-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']
        labels:
          environment: 'production'
          service: 'api'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
