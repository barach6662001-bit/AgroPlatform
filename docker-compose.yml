services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_DB: agroplatform_db
      POSTGRES_USER: agroplatform
      POSTGRES_PASSWORD: agroplatform_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroplatform -d agroplatform_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agro-network

  api:
    build:
      context: .
      dockerfile: src/AgroPlatform.Api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=agroplatform_db;Username=agroplatform;Password=agroplatform_dev"
      JwtSettings__Key: "change-me-super-secret-key-minimum-32-characters!!"  # REPLACE before deploying to any shared environment
      JwtSettings__Issuer: "AgroPlatform"
      JwtSettings__Audience: "AgroPlatform"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agro-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agro-network

volumes:
  pgdata:

networks:
  agro-network:
